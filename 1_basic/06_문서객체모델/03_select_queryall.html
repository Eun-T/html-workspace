<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      window.onload = function () {
        let header = document.querySelectorAll('h1');
        // console.log(header)
        for (i of header) {
          // console.log(i)
          i.style.color = 'red';
          i.style.backgroundColor = 'green';
        }
      };
    </script>
  </head>
  <body>
    <h1>header</h1>
    <h1>header</h1>
    <h1>header</h1>
  </body>
</html>
