<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Basic - 변수</title>
    <!-- 스크립트 -->
    <script>
      // 값을 처음으로 할당하는 것 = 초기화
      const PI = 3.14159265;
      let rad = 10;

      // 출력
      // alert(PI * rad * rad);
      alert(PI * 2 * rad);
    </script>
  </head>
  <body>
