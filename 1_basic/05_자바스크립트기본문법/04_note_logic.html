    <title>Javascript</title>

    <script>
      let month = new Date().getMonth() + 1;

      if (3 <= month && month <= 5) {
        // &&(AND) : 조건식이 둘다 true일때만 수행
        alert('봄입니다');
      } else if (6 <= month && month <= 8) {
        alert('여름입니다');
      } else if (9 <= month && month <= 11) {
        alert('가을입니다');
      } else if(month == 12 || month == 2 || month == 1){
        alert('겨울입니다');
      } else {
        alert("아무것도 아닙니다")
      }
