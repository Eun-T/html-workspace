1 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Basic</title>

    <script>
      // Date 객체 : 현재 시간
      let date = new Date();

      let hours = date.getHours();
      // console.log(hours);
      if (0 <= hours && hours < 12) {
        alert('오전입니다');
      } else {
        alert('오후입니다');
      }
    </script>
  </head>
  <body></body>
</html>
