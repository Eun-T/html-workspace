<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 문법</title>
  </head>
  <body>
    <script>
      let sum = 0;
      for (let i = 0; i <= 100; i++) {
        sum += i;
    }
    // -> i는 for문 안에서만 사용 가능하다.
    alert(sum);
    </script>
  </body>
</html>
