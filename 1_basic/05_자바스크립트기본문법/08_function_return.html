<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript - Function</title>
  </head>
  <body>
    <h3>함수 function</h3>
    <pre>
        function 함수명([매개변수]){

            // 함수를 정의
            return 반환값;
        }

        함수명(); //함수 호출
    </pre>
    <script>
        function f(x){
            return x+x;
        }

        let i = f(3)
        alert(i)
        // alert(f(4))
    </script>
  </body>
</html>
