                         (단, input의 "name 속성"이 존재해야만 전달됨) -->

              <fieldset>
                <!-- fieldset : form태그 내부에서 input을 종류별로 묶는 용도로 많이 사용함 -->
                <input
                  type="text"
                  name="query"
                  placeholder="검색어를 입력해주세요"
                  autocomplete="off"
                  id="query"
